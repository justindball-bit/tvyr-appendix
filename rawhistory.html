<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Frame-Options" content="ALLOWALL">
<meta name="referrer" content="no-referrer">
<title>RawHistory.wtf</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #2a2620;
    font-family: 'Inconsolata', monospace;
  }

  .panel {
    width: 100%;
    background: #2a2620;
    padding: 60px 56px 52px;
    color: #c8c2b8;
  }

  .site-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #f0ebe2;
    text-align: center;
    margin-bottom: 10px;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 24px;
    font-weight: 300;
    color: #a09880;
    text-align: center;
    letter-spacing: 0.08em;
    margin-bottom: 48px;
  }

  .preview-window {
    width: 100%;
    aspect-ratio: 16/9;
    background: #161410;
    border: 1px solid #3a3630;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
  }

  .preview-figures {
    display: flex;
    gap: 48px;
    align-items: flex-end;
    margin-bottom: 0;
    opacity: 0.25;
  }

  .figure {
    width: 38px;
    height: 90px;
    background: #c8c2b8;
    clip-path: polygon(35% 0%, 65% 0%, 78% 30%, 85% 100%, 15% 100%, 22% 30%);
  }

  .figure.shorter {
    height: 76px;
  }

  .preview-label {
    font-family: 'Inconsolata', monospace;
    font-size: 16px;
    letter-spacing: 0.2em;
    color: #7a7060;
    text-align: center;
    margin-bottom: 40px;
    text-transform: uppercase;
  }

  .rule {
    border: none;
    border-top: 1px solid #3a3630;
    margin: 0 0 36px 0;
  }

  .tiers {
    margin-bottom: 8px;
  }

  .tier-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 0;
    border-bottom: 1px solid #332e28;
  }

  .tier-row:last-child {
    border-bottom: none;
  }

  .tier-label {
    font-size: 16px;
    letter-spacing: 0.15em;
    color: #908878;
    text-transform: uppercase;
  }

  .tier-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    color: #c8c2b8;
    letter-spacing: 0.05em;
  }

  .tier-status {
    font-size: 16px;
    letter-spacing: 0.15em;
    color: #7a7060;
    text-transform: uppercase;
    text-align: center;
    margin: 20px 0 6px;
  }

  .waitlist-line {
    font-size: 16px;
    letter-spacing: 0.15em;
    color: #908878;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 32px;
  }

  .sign-off {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    color: #7a7060;
    text-align: center;
    margin-bottom: 48px;
    letter-spacing: 0.05em;
  }

  .rule-nav {
    border: none;
    border-top: 1px solid #3a3630;
    margin: 0 0 40px 0;
  }

  .nav-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0 32px;
  }

  .nav-column h3 {
    font-size: 16px;
    letter-spacing: 0.25em;
    color: #7a7060;
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid #3a3630;
  }

  .nav-column ul {
    list-style: none;
  }

  .nav-column ul li {
    margin-bottom: 10px;
  }

  .nav-column ul li a {
    font-size: 18px;
    letter-spacing: 0.08em;
    color: #a09880;
    text-decoration: none;
    line-height: 1.4;
    display: block;
    transition: color 0.2s ease;
  }

  .nav-column ul li a:hover {
    color: #f0ebe2;
  }
</style>
</head>
<body>

<div class="panel">

  <div class="site-title">RAWHISTORY.WTF</div>
  <div class="tagline">Raw. Real. Unwitnessed. Until now.</div>

  <div class="preview-window">
    <div class="preview-figures">
      <div class="figure"></div>
      <div class="figure shorter"></div>
    </div>
  </div>
  <div class="preview-label">Coming very soon.</div>

  <hr class="rule">

  <div class="tiers">
    <div class="tier-row">
      <span class="tier-label">Monthly membership</span>
      <span class="tier-price">$500 / month</span>
    </div>
    <div class="tier-row">
      <span class="tier-label">Full archive access</span>
      <span class="tier-price">$10,000</span>
    </div>
  </div>

  <div class="tier-status">Membership currently closed.</div>
  <div class="waitlist-line">Waitlist open.</div>

  <div class="sign-off">History doesn't judge. Neither do we.</div>

  <hr class="rule-nav">

  <div class="nav-grid" style="grid-template-columns: 1fr 1fr;">

    <div class="nav-column">
      <h3>Archive</h3>
      <ul>
        <li><a href="https://sites.google.com/view/thelongwatch/the-voyeur/r1-cleopatra-caesar">Release 01 — Cleopatra &amp; Caesar</a></li>
      </ul>
    </div>

    <div class="nav-column">
      <h3>Internal</h3>
      <ul>
        <li><a href="https://sites.google.com/view/thelongwatch/the-voyeur/noise-internal">NOISE</a></li>
      </ul>
    </div>

  </div>

</div>

</body>
</html>
